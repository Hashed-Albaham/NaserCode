name: Daily Permit Report Alert

on:
#  schedule:
#    - cron: '0 8 * * *'
  workflow_dispatch:

# هذا المتغير هو الحل الدائم المعتمد من GitHub لتخطي رسائل التحديث المستقبلية
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Telegram Alert Script
      env:
        DROPBOX_URL: ${{ secrets.DROPBOX_URL }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python main.py
