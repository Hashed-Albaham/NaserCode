name: Daily Permit Report Alert

on:
  schedule:
    # التوقيت: 08:00 صباحاً بتوقيت جرينتش UTC يوازي 11:00 صباحاً بتوقيت السعودية/اليمن
    - cron: '0 8 * * *'
  workflow_dispatch: # للسماح لك بتشغيله يدوياً للتجربة

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Telegram Alert Script
      env:
        # هنا نخبر السيرفر أن يسحب البيانات السرية من إعداداتك
        DROPBOX_URL: ${{ secrets.DROPBOX_URL }}
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python main.py
